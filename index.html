<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef, useContext } = React;

/* ==== Sandi akses proyek pribadi — GANTI sesukamu ==== */
const AKSES_SANDI = "yusuf";

/* ---------- Brand Logo (stroke geometric) ---------- */
function Logo({ className = "" }) {
  return (
    <svg viewBox="0 0 32 32" fill="none" className={className} xmlns="http://www.w3.org/2000/svg">
      <path d="M16 3 L27 9.5 V22.5 L16 29 L5 22.5 V9.5 Z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/>
      <path d="M16 3 V16 L27 9.5" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" opacity="0.55"/>
      <path d="M16 16 L5 22.5 M16 16 L16 29" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" opacity="0.55"/>
      <circle cx="16" cy="16" r="2.4" fill="currentColor"/>
    </svg>
  );
}

/* ---------- Scroll reveal ---------- */
function FadeInUp({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setShown(true); io.unobserve(el); } },
      { threshold: 0.12 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} className={className}
      style={{
        transition: "transform 1000ms cubic-bezier(0.16,1,0.3,1), opacity 1000ms cubic-bezier(0.16,1,0.3,1)",
        transitionDelay: `${delay}ms`,
        transform: shown ? "translateY(0)" : "translateY(2.5rem)",
        opacity: shown ? 1 : 0,
      }}>
      {children}
    </div>
  );
}

/* ---------- Auth (login email, client-side) ---------- */
const AuthCtx = React.createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({ children }) {
  const [email, setEmail] = useState(() => localStorage.getItem("yusuf-auth") || null);
  const [modal, setModal] = useState(false);
  const login = (e) => { localStorage.setItem("yusuf-auth", e); setEmail(e); setModal(false); };
  const logout = () => { localStorage.removeItem("yusuf-auth"); setEmail(null); };
  return (
    <AuthCtx.Provider value={{ email, login, logout, promptLogin: () => setModal(true) }}>
      {children}
      {modal && <LoginModal onClose={() => setModal(false)} onLogin={login} />}
    </AuthCtx.Provider>
  );
}

function LoginModal({ onClose, onLogin }) {
  const [email, setEmail] = useState("");
  const [sandi, setSandi] = useState("");
  const [err, setErr] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr("Email tidak valid."); return; }
    if (sandi !== AKSES_SANDI) { setErr("Sandi salah."); return; }
    onLogin(email);
  };
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/70 backdrop-blur-sm" onClick={onClose}>
      <form onClick={(e) => e.stopPropagation()} onSubmit={submit} className="w-full max-w-sm bg-[#101012] border border-white/10 rounded-2xl p-6">
        <div className="flex items-center gap-2 mb-1"><Logo className="w-6 h-6 text-white" /><span className="font-semibold">Masuk</span></div>
        <p className="text-sm text-gray-400 mb-5">Login untuk membuka proyek pribadi.</p>
        <label className="block text-xs text-gray-400 mb-1">Email</label>
        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="kamu@email.com" autoFocus
          className="w-full mb-3 bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-white/30" />
        <label className="block text-xs text-gray-400 mb-1">Sandi</label>
        <input type="password" value={sandi} onChange={(e) => setSandi(e.target.value)} placeholder="••••••"
          className="w-full mb-3 bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-white/30" />
        {err && <p className="text-xs text-red-400 mb-3">{err}</p>}
        <button type="submit" className="w-full bg-white text-black text-sm font-medium py-2.5 rounded-xl hover:bg-gray-200 transition-colors">Masuk</button>
        <button type="button" onClick={onClose} className="w-full text-xs text-gray-500 mt-3 hover:text-gray-300">Batal</button>
      </form>
    </div>
  );
}

/* ================= NAVBAR ================= */

  const links = [["Beranda", "#about"], ["Proyek", "#projects"], ["Kontak", "#contact"]];
  const AuthBtn = ({ mobile }) => email ? (
    <div className={`flex items-center gap-3 ${mobile ? "mt-2" : ""}`}>
      <span className="text-xs text-gray-400 max-w-[150px] truncate">{email}</span>
      <button onClick={logout} className="text-white text-sm font-medium px-4 py-2 rounded-full border border-white/10 hover:bg-white/5 transition-colors">Keluar</button>

  ) : (
    <button onClick={() => { promptLogin(); setOpen(false); }} className={`bg-[#1F1F22] hover:bg-[#2A2A2D] text-white text-sm font-medium px-5 py-2.5 rounded-full border border-white/5 transition-colors ${mobile ? "mt-2 w-full" : ""}`}>Masuk</button>
  );
  return (
    <nav className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? "bg-black/80 backdrop-blur-md" : "bg-transparent"}`}>
      <div className="max-w-7xl mx-auto px-6">
        <div className="flex items-center justify-between h-16">
          <a href="#about" className="flex items-center gap-2 text-white">
            <Logo className="w-7 h-7" />
            <span className="text-lg font-semibold tracking-tight">Yusuf</span>
          </a>
          <div className="hidden md:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
            {links.map(([l, h]) => <a key={l} href={h} className="text-sm font-medium text-gray-300 hover:text-white transition-colors">{l}</a>)}
          </div>
          <div className="hidden md:block"><AuthBtn /></div>
          <button className="md:hidden text-white p-2" onClick={() => setOpen(v => !v)} aria-label="Menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
              {open ? <path d="M6 6l12 12M18 6L6 18" /> : <path d="M4 7h16M4 12h16M4 17h16" />}
            </svg>
          </button>
        </div>
        <div className={`md:hidden overflow-hidden transition-all duration-300 ${open ? "max-h-96 pb-4" : "max-h-0"}`}>
          <div className="flex flex-col gap-1 pt-2">
            {links.map(([l, h]) => <a key={l} href={h} onClick={() => setOpen(false)} className="text-sm font-medium text-gray-300 hover:text-white py-2.5 px-1 transition-colors">{l}</a>)}
            <AuthBtn mobile />
          </div>
        </div>
      </div>
    </nav>
  );
}

const DEFAULT_BOARD = {
  pribadi: ["bodiku", "dines-mulu-kapan-kerja", "tes-deh", "betece"],
  umum:    ["fotoflow", "pidio-poto", "editanpoto", "inipoto-studio-pro"],

  jualan:  ["cashiermiuw", "miuw_mauw", "latihan-jualan-841x"],
  games:   ["hero-combo-manager", "steam-checker", "kintil"],
  deleted: [],
};

/* Selaraskan board tersimpan dengan daftar proyek terkini */
function reconcile(saved) {
  const keys = CATEGORIES.map((c) => c.key);
  const deleted = (Array.isArray(saved.deleted) ? saved.deleted : []).filter((id) => ALL_PROJECTS[id]);
  const delSet = new Set(deleted);
  const board = { deleted };
  const seen = new Set(deleted);
  keys.forEach((k) => {
    board[k] = (Array.isArray(saved[k]) ? saved[k] : []).filter((id) => ALL_PROJECTS[id] && !delSet.has(id));
    board[k].forEach((id) => seen.add(id));
  });
  Object.keys(ALL_PROJECTS).forEach((id) => {
    if (!seen.has(id)) {
      const def = keys.find((k) => DEFAULT_BOARD[k].includes(id)) || "umum";
      board[def].push(id);
    }
  });
  return board;
}

  );
}

function Column({ cat, ids, over, setOver, onDrop, dragId, onDragStart, onDragEnd, onDelete }) {
  const { email } = useAuth();
  const active = over === cat.key;
  const showLock = cat.locked && !email;
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); if (over !== cat.key) setOver(cat.key); }}
      onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOver((o) => (o === cat.key ? null : o)); }}
      onDrop={(e) => { e.preventDefault(); onDrop(cat.key); setOver(null); }}
      className="flex-1 min-w-[280px] flex flex-col rounded-2xl border-2 transition-colors duration-200"
      style={{ borderColor: active ? cat.accent : "rgba(255,255,255,0.16)", background: active ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.02)" }}
    >
      <div className="flex items-center justify-between p-4 border-b" style={{ borderColor: "rgba(255,255,255,0.10)" }}>
        <div className="flex items-center gap-2.5">
          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: cat.accent }} />
          <div>
            <h3 className="text-base font-semibold flex items-center gap-1.5">
              {cat.title}
              {showLock && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-gray-500"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>}
            </h3>
            <p className="text-[11px] text-gray-500">{cat.subtitle}</p>
          </div>
        </div>
        <span className="text-xs text-gray-300 rounded-full px-2.5 py-1 font-medium" style={{ backgroundColor: cat.accent + "22", border: "1px solid " + cat.accent + "55" }}>{ids.length}</span>
      </div>
      <div className="p-3 flex flex-col gap-3 overflow-y-auto" style={{ maxHeight: "62vh" }}>
        {ids.length === 0 && (
          <div className="h-24 rounded-xl border border-dashed border-white/15 flex items-center justify-center text-xs text-gray-600">Tarik proyek ke sini</div>
        )}
        {ids.map((id) => (
          <ProjectCard key={id} id={id} p={ALL_PROJECTS[id]} colKey={cat.key} dragging={dragId === id} onDragStart={onDragStart} onDragEnd={onDragEnd} onDelete={onDelete} />
        ))}
      </div>
    </div>
  );
}

function Projects() {
  const [board, setBoard] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem("yusuf-board-v2"));
      if (s && typeof s === "object") return reconcile(s);
    } catch (e) {}
    return DEFAULT_BOARD;
  });
  const [over, setOver] = useState(null);
  const [dragId, setDragId] = useState(null);
  const dragRef = useRef(null);

  useEffect(() => { localStorage.setItem("yusuf-board-v2", JSON.stringify(board)); }, [board]);

  const onDragStart = (e, id) => {
    dragRef.current = id;
    setDragId(id);
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch (_) {}
  };
  const onDragEnd = () => { dragRef.current = null; setDragId(null); setOver(null); };

  const onDrop = (target) => {
    const id = dragRef.current;
    if (!id) return;
    setBoard((prev) => {
      const next = { deleted: prev.deleted || [] };
      CATEGORIES.forEach((c) => { next[c.key] = prev[c.key].filter((x) => x !== id); });
      if (!next[target].includes(id)) next[target] = [...next[target], id];
      return next;
    });
    dragRef.current = null;
    setDragId(null);
  };

  const onDelete = (id) => {
    setBoard((prev) => {
      const next = { deleted: [...(prev.deleted || []), id] };
      CATEGORIES.forEach((c) => { next[c.key] = prev[c.key].filter((x) => x !== id); });
      return next;
    });
  };
  const restoreAll = () => setBoard((prev) => reconcile({ ...prev, deleted: [] }));

  const deletedCount = (board.deleted || []).length;

  return (
    <section id="projects" className="w-full py-24 px-6">
      <FadeInUp className="text-center mb-14 max-w-2xl mx-auto">
        <span className="text-sm font-medium candy-text">✨ Ruang kerjamu</span>
        <h2 className="text-4xl md:text-5xl font-semibold mt-3 tracking-tight">
          Semua <span className="candy-text">proyek Vercel</span>, satu tempat.
        </h2>
        <p className="text-gray-400 mt-4 text-[16px]">
          Papan horizontal — seret kartu antar kategori, hapus lewat ikon tong sampah. Pribadi terkunci sampai login. Tersimpan otomatis.
        </p>
      </FadeInUp>

      <FadeInUp>
        <div className="flex gap-5 overflow-x-auto items-start pb-4">
          {CATEGORIES.map((cat) => (
            <Column key={cat.key} cat={cat} ids={board[cat.key]} over={over} setOver={setOver} onDrop={onDrop} dragId={dragId} onDragStart={onDragStart} onDragEnd={onDragEnd} onDelete={onDelete} />
          ))}
        </div>
        <div className="flex items-center justify-center gap-5 mt-8 text-xs">
          <button onClick={() => setBoard(DEFAULT_BOARD)} className="text-gray-500 hover:text-gray-300 transition-colors">Atur ulang ke bawaan</button>
          {deletedCount > 0 && (
            <button onClick={restoreAll} className="text-gray-400 hover:text-white transition-colors inline-flex items-center gap-1.5">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
              Pulihkan {deletedCount} yang dihapus
            </button>
          )}
        </div>
      </FadeInUp>
    </section>
  );
}

/* ================= FOOTER ================= */
function Footer() {
  return (
    <footer id="contact" className="relative z-0 pt-32 pb-10 px-6 border-t border-white/5 overflow-hidden">
      <video autoPlay loop muted playsInline className="absolute inset-0 object-cover w-full h-full opacity-40 -z-10">
        <source src="https://cdn.sceneai.art/Hero%20Section%20Video/50b4f304-cdca-4e12-8735-580d225834be.mp4" type="video/mp4" />
      </video>
      <div className="absolute inset-0 -z-10 bg-gradient-to-b from-black via-black/60 to-black" />

      <div className="max-w-3xl mx-auto text-center mb-20">
        <div className="flex items-center justify-center gap-2 mb-4">
          <Logo className="w-8 h-8 text-white" />
          <span className="text-2xl font-bold">Yusuf</span>
        </div>
        <p className="text-gray-400 mb-8">Semua proyek Vercel — pribadi, umum, kantor, jualan, games — terorganisir dalam satu dashboard.</p>
        <div className="flex flex-wrap justify-center gap-2">
          {CATEGORIES.map((c) => (
            <a key={c.key} href="#projects" className="text-xs text-gray-300 bg-white/5 border border-white/10 rounded-full px-3.5 py-1.5 hover:bg-white/10 transition-colors">{c.title}</a>
          ))}
        </div>
      </div>

      <div className="flex flex-col md:flex-row justify-center items-center gap-4 text-xs text-gray-500 border-t border-white/5 pt-8 max-w-7xl mx-auto text-center">
        <span>© 2026 Yusuf · Dashboard proyek Vercel</span>
      </div>
    </footer>
  );
}

/* ================= APP ================= */
function App() {
  return (
    <AuthProvider>
      <div className="bg-black text-white min-h-screen antialiased overflow-x-hidden">
        <Navbar />
        <Hero />
        <Projects />
        <Footer />
      </div>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
