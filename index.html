      <circle cx="16" cy="16" r="2.4" fill="currentColor"/>

  );
}

/* ---------- Scroll reveal wrapper ---------- */
function FadeInUp({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setShown(true); io.unobserve(el); } },
      { threshold: 0.12 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div
      ref={ref}
      className={className}
      style={{
        transition: "transform 1000ms cubic-bezier(0.16,1,0.3,1), opacity 1000ms cubic-bezier(0.16,1,0.3,1)",
        transitionDelay: `${delay}ms`,
        transform: shown ? "translateY(0)" : "translateY(2.5rem)",
        opacity: shown ? 1 : 0,
      }}
    >
      {children}
    </div>
  );
}

const DEFAULT_BOARD = {
  pribadi: ["dakjalan-tts-proxy", "dines-mulu-kapan-kerja", "wawancara", "tes-deh", "kintil", "betece", "hero-combo-manager", "latihan-jualan-841x"],
  umum: ["fotoflow", "cashiermiuw", "miuw_mauw", "ujian-sekolah", "dakjalan-jembatan", "dbh-sawit-2026", "steam-checker", "editanpoto", "inipoto-studio-pro", "pidio-poto", "bodiku", "emonjalan"],
};

/* Selaraskan board tersimpan dengan daftar proyek terkini (buang yang hilang, tambah yang baru) */
function reconcile(saved) {
  const seen = new Set([...(saved.pribadi || []), ...(saved.umum || [])]);
  const pribadi = (saved.pribadi || []).filter((id) => ALL_PROJECTS[id]);
  const umum = (saved.umum || []).filter((id) => ALL_PROJECTS[id]);
  Object.keys(ALL_PROJECTS).forEach((id) => {
    if (!seen.has(id)) (DEFAULT_BOARD.umum.includes(id) ? umum : pribadi).push(id);
  });
  return { pribadi, umum };
}

      <circle cx="330" cy="34" r="95" fill="#ffffff" opacity="0.14" />

function Column({ title, subtitle, colKey, ids, over, setOver, onDrop, dragId, onDragStart, onDragEnd }) {
  const active = over === colKey;
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); if (over !== colKey) setOver(colKey); }}
      onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOver(o => (o === colKey ? null : o)); }}
      onDrop={(e) => { e.preventDefault(); onDrop(colKey); setOver(null); }}
      className={`rounded-3xl border p-5 transition-colors duration-200 ${active ? "border-white/40 bg-white/[0.05]" : "border-white/10 bg-white/[0.015]"}`}
    >
      <div className="flex items-center justify-between mb-5 px-1">
        <div>
          <h3 className="text-lg font-semibold">{title}</h3>
          <p className="text-xs text-gray-500">{subtitle}</p>
        </div>
        <span className="text-xs text-gray-400 bg-white/5 border border-white/10 rounded-full px-2.5 py-1">{ids.length}</span>
      </div>
      <div className="grid sm:grid-cols-2 gap-4 min-h-[140px]">
        {ids.length === 0 && (
          <div className="col-span-full h-32 rounded-2xl border border-dashed border-white/15 flex items-center justify-center text-sm text-gray-600">
            Tarik proyek ke sini
          </div>
        )}
        {ids.map((id) => (
          <ProjectCard key={id} id={id} p={ALL_PROJECTS[id]} dragging={dragId === id} onDragStart={onDragStart} onDragEnd={onDragEnd} />
        ))}
      </div>
    </div>
  );
}

function Projects() {
  const [board, setBoard] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem("plety-board-v2"));
      if (s && Array.isArray(s.umum) && Array.isArray(s.pribadi)) return reconcile(s);
    } catch (e) {}
    return DEFAULT_BOARD;
  });
  const [over, setOver] = useState(null);
  const [dragId, setDragId] = useState(null);
  const dragRef = useRef(null);

  useEffect(() => {
    localStorage.setItem("plety-board-v2", JSON.stringify(board));
  }, [board]);

  const onDragStart = (e, id) => {
    dragRef.current = id;
    setDragId(id);
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch (_) {}
  };
  const onDragEnd = () => { dragRef.current = null; setDragId(null); setOver(null); };

  const onDrop = (target) => {
    const id = dragRef.current;
    if (!id) return;
    setBoard((prev) => {
      const umum = prev.umum.filter((x) => x !== id);
      const pribadi = prev.pribadi.filter((x) => x !== id);
      const next = { umum, pribadi };
      if (!next[target].includes(id)) next[target] = [...next[target], id];
      return next;
    });
    dragRef.current = null;
    setDragId(null);
  };

  return (
    <section id="projects" className="max-w-7xl mx-auto py-24 px-6">
      <FadeInUp className="text-center mb-14">
        <span className="text-sm font-medium candy-text">✨ Ruang kerjamu</span>
        <h2 className="text-4xl md:text-5xl font-semibold mt-3 tracking-tight">
          Semua <span className="candy-text">proyek Vercel</span>, satu tempat.
        </h2>
        <p className="text-gray-400 max-w-xl mx-auto mt-4 text-[16px]">
          Seret setiap kartu untuk memisahkan proyek pribadi dan umum. Susunanmu tersimpan otomatis.
        </p>
      </FadeInUp>

      <FadeInUp>
        <div className="grid lg:grid-cols-2 gap-6">
          <Column title="Proyek Pribadi" subtitle="Hanya kamu yang lihat" colKey="pribadi" ids={board.pribadi}
                  over={over} setOver={setOver} onDrop={onDrop} dragId={dragId} onDragStart={onDragStart} onDragEnd={onDragEnd} />
          <Column title="Proyek Umum" subtitle="Tampil untuk publik" colKey="umum" ids={board.umum}
                  over={over} setOver={setOver} onDrop={onDrop} dragId={dragId} onDragStart={onDragStart} onDragEnd={onDragEnd} />
        </div>
        <div className="text-center mt-8">
          <button onClick={() => setBoard(DEFAULT_BOARD)} className="text-xs text-gray-500 hover:text-gray-300 transition-colors">
            Atur ulang ke bawaan
          </button>
        </div>
      </FadeInUp>
    </section>
  );
}

  const cols = [
