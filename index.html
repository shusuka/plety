/* ---------- Scroll reveal ---------- */
function FadeInUp({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setShown(true); io.unobserve(el); } },
      { threshold: 0.12 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} className={className}
      style={{
        transition: "transform 1000ms cubic-bezier(0.16,1,0.3,1), opacity 1000ms cubic-bezier(0.16,1,0.3,1)",
        transitionDelay: `${delay}ms`,
        transform: shown ? "translateY(0)" : "translateY(2.5rem)",
        opacity: shown ? 1 : 0,
      }}>
      {children}
    </div>
  );
}

/* ---------- Auth (login email, client-side) ---------- */
const AuthCtx = React.createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [modal, setModal] = useState(false);
  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => setUser(u || null));
    return () => unsub();
  }, []);
  const value = {
    email: user ? user.email : null,
    login: (e, p) => firebase.auth().signInWithEmailAndPassword(e, p),
    logout: () => firebase.auth().signOut(),
    promptLogin: () => setModal(true),
  };
  return (
    <AuthCtx.Provider value={value}>
      {children}
      {modal && <LoginModal onClose={() => setModal(false)} />}
    </AuthCtx.Provider>
  );
}

function LoginModal({ onClose }) {
  const { login } = useAuth();
  const [email, setEmail] = useState("");
  const [sandi, setSandi] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    try {
      await login(email.trim(), sandi);
      onClose();
    } catch (ex) {
      const c = ex && ex.code ? ex.code : "";
      setErr(
        c === "auth/invalid-email" ? "Format email tidak valid." :
        (c === "auth/user-not-found" || c === "auth/wrong-password" || c === "auth/invalid-credential") ? "Email atau sandi salah." :
        c === "auth/too-many-requests" ? "Terlalu banyak percobaan. Coba lagi nanti." :
        c === "auth/network-request-failed" ? "Gangguan jaringan. Coba lagi." :
        (ex && ex.message) || "Gagal masuk."
      );
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center px-6 bg-black/70 backdrop-blur-sm" onClick={onClose}>
      <form onClick={(e) => e.stopPropagation()} onSubmit={submit} className="w-full max-w-sm bg-[#101012] border border-white/10 rounded-2xl p-6">
        <div className="flex items-center gap-2 mb-1"><Logo className="w-6 h-6 text-white" /><span className="font-semibold">Masuk</span></div>
        <p className="text-sm text-gray-400 mb-5">Login untuk mengatur & membuka proyek pribadi.</p>
        <label className="block text-xs text-gray-400 mb-1">Email</label>
        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="kamu@email.com" autoFocus
          className="w-full mb-3 bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-white/30" />
        <label className="block text-xs text-gray-400 mb-1">Sandi</label>

        <button type="button" onClick={onClose} className="w-full text-xs text-gray-500 mt-3 hover:text-gray-300">Batal</button>
      </form>

/* Warna mesh untuk proyek yang ditambah manual (tidak punya c1/c2 dari kode) */
const PALETTE = [
  ["#f472b6", "#fb7185"], ["#a78bfa", "#e879f9"], ["#38bdf8", "#22d3ee"],
  ["#818cf8", "#60a5fa"], ["#34d399", "#2dd4bf"], ["#fbbf24", "#f59e0b"],
  ["#f87171", "#fb923c"], ["#c084fc", "#a78bfa"], ["#4ade80", "#22c55e"],
  ["#60a5fa", "#3b82f6"],
];
function colorsFor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}
function slugify(s) {
  return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40) || "proyek";
}

/* Gabungkan seed kode dengan dokumen Firestore. Dokumen menang. */
function mergeProjects(docs) {
  const out = {};
  Object.keys(BASE_PROJECTS).forEach((id) => { out[id] = { ...BASE_PROJECTS[id] }; });
  Object.keys(docs).forEach((id) => {
    const merged = { ...(out[id] || {}), ...docs[id] };
    if (!merged.c1 || !merged.c2) { const [c1, c2] = colorsFor(id); merged.c1 = c1; merged.c2 = c2; }
    if (!merged.status || !STATUS[merged.status]) merged.status = "READY";
    if (merged.fw === undefined) merged.fw = null;
    out[id] = merged;
  });
  // Proyek tambahan = yang tidak ada di seed kode; hanya ini yang boleh dihapus permanen.
  Object.keys(out).forEach((id) => { out[id].custom = !BASE_PROJECTS[id]; });
  return out;
}

/* Kompres gambar di browser jadi data URL kecil (tanpa Firebase Storage) */
const MAX_THUMB_BYTES = 900000; // batas aman di bawah limit 1 MB per dokumen Firestore
function compressImage(file, maxDim = 512) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) return reject(new Error("File harus berupa gambar."));
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Gagal membaca file."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Gambar tidak bisa dibaca."));
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        let q = 0.75;
        let out = c.toDataURL("image/jpeg", q);
        while (out.length > MAX_THUMB_BYTES && q > 0.3) { q -= 0.1; out = c.toDataURL("image/jpeg", q); }
        if (out.length > MAX_THUMB_BYTES) return reject(new Error("Gambar terlalu besar. Coba gambar lain."));
        resolve(out);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Selaraskan board tersimpan dengan daftar proyek terkini (seed + Firestore) */
function reconcile(saved, projects) {
  const keys = CATEGORIES.map((c) => c.key);
  const deleted = (Array.isArray(saved.deleted) ? saved.deleted : []).filter((id) => projects[id]);
  const delSet = new Set(deleted);
  const board = { deleted };
  const seen = new Set(deleted);
  keys.forEach((k) => {
    board[k] = (Array.isArray(saved[k]) ? saved[k] : []).filter((id) => projects[id] && !delSet.has(id));
    board[k].forEach((id) => seen.add(id));
  });
  Object.keys(projects).forEach((id) => {
    if (!seen.has(id)) {
      const fromSeed = keys.find((k) => DEFAULT_BOARD[k].includes(id));
      const fromDoc = keys.includes(projects[id].cat) ? projects[id].cat : null;
      board[fromSeed || fromDoc || "umum"].push(id);
    }
  });
  return board;
}

/* Inisial monogram dari nama proyek */
function initials(name) {
  const w = name.replace(/[^A-Za-z0-9 ]/g, " ").trim().split(/\s+/).filter(Boolean);
  if (w.length >= 2) return (w[0][0] + w[1][0]).toUpperCase();
  return (name.replace(/[^A-Za-z0-9]/g, "").slice(0, 2) || "??").toUpperCase();
}
/* Mesh gradient candy per proyek */
function meshStyle(p) {
  return {
    backgroundColor: "#16161d",
    backgroundImage:
      `radial-gradient(circle at 20% 15%, ${p.c1}, transparent 55%),` +
      `radial-gradient(circle at 85% 80%, ${p.c2}, transparent 55%),` +
      `radial-gradient(circle at 60% 45%, ${p.c1}55, transparent 60%)`,
  };
}

function ProjectCard({ id, p, colKey, img, dragging, canDrag, canEdit, onDragStart, onDragEnd, onDelete, onEditImage }) {

  return (
    <div
      draggable={canDrag}
      onDragStart={(e) => onDragStart(e, id)}
      onDragEnd={onDragEnd}

      title={locked ? "Masuk untuk buka" : p.url}
      className={`group relative w-[150px] flex-shrink-0 select-none transition-all duration-200

    >
      <div className="relative aspect-square rounded-2xl overflow-hidden border border-white/10 group-hover:border-white/30 transition-colors"
        style={showImg ? { backgroundColor: "#16161d" } : meshStyle(p)}>
        {showImg ? (

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
            </button>
          </div>
        )}
      </div>
      <div className="mt-2 px-0.5">
        <h3 className="text-[12.5px] font-medium truncate leading-tight">{p.name}</h3>
        <p className="text-[10.5px] text-gray-500">{FRAMEWORK[p.fw]}</p>
      </div>
    </div>
  );
}

/* Modal admin: tambah proyek baru / edit kartu (data + gambar), tersimpan di Firestore */
const FIELD = "w-full bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-white/30";

function CardModal({ mode, p, currentImage, onClose, onSave }) {
  const isAdd = mode === "add";
  const [name, setName] = useState(isAdd ? "" : p.name);
  const [desc, setDesc] = useState(isAdd ? "" : p.desc || "");
  const [url, setUrl] = useState(isAdd ? "" : p.url || "");
  const [cat, setCat] = useState("umum");
  const [fw, setFw] = useState(isAdd ? "" : p.fw || "");
  const [status, setStatus] = useState(isAdd ? "READY" : p.status);
  const [img, setImg] = useState(currentImage || "");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const isData = img.startsWith("data:");
  const preview = isAdd ? { name: name || "Proyek", ...(() => { const [c1, c2] = colorsFor(slugify(name || "proyek")); return { c1, c2 }; })() } : p;

  const pick = async (file) => {
    if (!file) return;
    setBusy(true); setErr("");
    try { setImg(await compressImage(file)); }
    catch (e) { setErr((e && e.message) || "Gagal memproses gambar."); }
    finally { setBusy(false); }
  };

  const submit = async () => {
    if (!name.trim()) return setErr("Nama proyek wajib diisi.");
    if (!url.trim()) return setErr("URL proyek wajib diisi.");
    setBusy(true); setErr("");
    try {
      const data = { name: name.trim(), desc: desc.trim(), url: url.trim(), fw: fw || null, status };
      if (isAdd) data.cat = cat;
      await onSave(data, img.trim());
      onClose();
    } catch (e) { setErr((e && e.message) || "Gagal menyimpan."); setBusy(false); }
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center px-6 py-10 bg-black/70 backdrop-blur-sm overflow-y-auto" onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="w-full max-w-sm bg-[#101012] border border-white/10 rounded-2xl p-6 my-auto">
        <h3 className="font-semibold mb-1">{isAdd ? "Tambah proyek" : "Edit kartu"}</h3>
        <p className="text-sm text-gray-400 mb-4">{isAdd ? "Proyek di luar akun Vercel-mu juga bisa." : p.name}</p>

        <div className="aspect-square w-24 mx-auto mb-4 rounded-xl overflow-hidden border border-white/10" style={img ? { backgroundColor: "#16161d" } : meshStyle(preview)}>
          {img
            ? <img src={img} alt="" className="w-full h-full object-cover" />
            : <span className="w-full h-full flex items-center justify-center text-xl font-bold text-white/90">{initials(preview.name)}</span>}
        </div>

        <label className="block text-xs text-gray-400 mb-1">Nama</label>
        <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Nama proyek" className={FIELD + " mb-3"} />

        <label className="block text-xs text-gray-400 mb-1">URL</label>
        <input type="text" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://contoh.vercel.app" className={FIELD + " mb-3"} />

        <label className="block text-xs text-gray-400 mb-1">Deskripsi</label>
        <input type="text" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="Keterangan singkat" className={FIELD + " mb-3"} />

        <div className="flex gap-3 mb-3">
          <div className="flex-1">
            <label className="block text-xs text-gray-400 mb-1">Framework</label>
            <select value={fw} onChange={(e) => setFw(e.target.value)} className={FIELD}>
              <option value="">Statis</option>
              <option value="vite">Vite</option>
              <option value="nextjs">Next.js</option>
              <option value="python">Python</option>
            </select>
          </div>
          <div className="flex-1">
            <label className="block text-xs text-gray-400 mb-1">Status</label>
            <select value={status} onChange={(e) => setStatus(e.target.value)} className={FIELD}>
              <option value="READY">Aktif</option>
              <option value="ERROR">Error</option>
              <option value="BLOCKED">Diblokir</option>
            </select>
          </div>
        </div>

        {isAdd && (
          <div className="mb-3">
            <label className="block text-xs text-gray-400 mb-1">Kategori</label>
            <select value={cat} onChange={(e) => setCat(e.target.value)} className={FIELD}>
              {CATEGORIES.map((c) => <option key={c.key} value={c.key}>{c.title}</option>)}
            </select>
          </div>
        )}

        <label className="block text-xs text-gray-400 mb-1">Link gambar</label>
        <input type="text" value={isData ? "" : img} onChange={(e) => setImg(e.target.value)}
          placeholder={isData ? "— memakai gambar hasil upload —" : "https://…/gambar.png (opsional)"} className={FIELD + " mb-3"} />

        <label className="block text-xs text-gray-400 mb-1">atau upload dari perangkat</label>
        <input type="file" accept="image/*" disabled={busy} onChange={(e) => pick(e.target.files[0])}
          className="w-full mb-2 text-xs text-gray-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-white/10 file:text-white file:text-xs hover:file:bg-white/20" />
        {isData && <p className="text-[11px] text-emerald-400 mb-3">Gambar terunggah · {Math.round(img.length / 1024)} KB (dikompres)</p>}

        {err && <p className="text-xs text-red-400 mb-3">{err}</p>}

        <button onClick={submit} disabled={busy}
          className="w-full bg-white text-black text-sm font-medium py-2.5 rounded-xl hover:bg-gray-200 transition-colors disabled:opacity-60">
          {busy ? "Menyimpan…" : isAdd ? "Tambah proyek" : "Simpan kartu"}
        </button>
        <div className="flex justify-between mt-3">
          {!isAdd && img
            ? <button onClick={() => setImg("")} disabled={busy} className="text-xs text-gray-500 hover:text-red-400">Hapus gambar</button>
            : <span />}
          <button onClick={onClose} className="text-xs text-gray-500 hover:text-gray-300">Batal</button>
        </div>
      </div>
    </div>
  );
}

function Column({ cat, ids, projects, images, over, setOver, onDrop, dragId, canDrag, canEdit, onDragStart, onDragEnd, onDelete, onEditImage }) {
  const { email } = useAuth();
  const active = over === cat.key;
  const showLock = cat.locked && !email;
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); if (over !== cat.key) setOver(cat.key); }}
      onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOver((o) => (o === cat.key ? null : o)); }}
      onDrop={(e) => { e.preventDefault(); onDrop(cat.key); setOver(null); }}
      className="rounded-2xl border-2 p-5 transition-colors duration-200"
      style={{ borderColor: active ? cat.accent : "rgba(255,255,255,0.16)", background: active ? "rgba(255,255,255,0.04)" : "transparent" }}
    >
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2.5">
          <span className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: cat.accent }} />
          <div>
            <h3 className="text-lg font-semibold flex items-center gap-1.5">
              {cat.title}
              {showLock && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-gray-500"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>}
            </h3>
            <p className="text-[11px] text-gray-500">{cat.subtitle}</p>
          </div>
        </div>
        <span className="text-xs text-gray-300 rounded-full px-2.5 py-1 font-medium" style={{ backgroundColor: cat.accent + "22", border: "1px solid " + cat.accent + "55" }}>{ids.length}</span>
      </div>
      <div className="flex gap-4 overflow-x-auto pb-2">
        {ids.length === 0 && (
          <div className="w-full h-40 rounded-xl border border-dashed border-white/15 flex items-center justify-center text-sm text-gray-600">Tarik proyek ke sini</div>
        )}
        {ids.map((id) => (
          <ProjectCard key={id} id={id} p={projects[id]} colKey={cat.key} img={images[id]} dragging={dragId === id} canDrag={canDrag} canEdit={canEdit} onDragStart={onDragStart} onDragEnd={onDragEnd} onDelete={onDelete} onEditImage={onEditImage} />
        ))}
      </div>
    </div>
  );
}

function Projects() {
  const [rawBoard, setRawBoard] = useState(DEFAULT_BOARD);
  const [docs, setDocs] = useState({});
  const [images, setImages] = useState({});
  const [boardErr, setBoardErr] = useState("");
  const [projErr, setProjErr] = useState("");
  const [thumbErr, setThumbErr] = useState("");
  const [editing, setEditing] = useState(null); // { mode:'add' } | { mode:'edit', id }
  const syncErr = boardErr || projErr || thumbErr;
  const [over, setOver] = useState(null);
  const [dragId, setDragId] = useState(null);
  const dragRef = useRef(null);
  const { email, promptLogin } = useAuth();
  const canDrag = !!email;
  const canEdit = !!email;

  /* Sinkron realtime: papan, data kartu, dan gambar — sama untuk semua user */
  useEffect(() => {
    const unsubBoard = boardRef().onSnapshot(
      (snap) => { setBoardErr(""); setRawBoard(snap.exists ? snap.data() : DEFAULT_BOARD); },
      (err) => setBoardErr(err.message || "Gagal sinkron papan.")
    );
    const unsubProjects = projectsCol().onSnapshot(
      (snap) => { setProjErr(""); const m = {}; snap.forEach((d) => { m[d.id] = d.data(); }); setDocs(m); },
      (err) => setProjErr(err.message || "Gagal sinkron data kartu.")
    );
    const unsubThumbs = thumbsCol().onSnapshot(
      (snap) => { setThumbErr(""); const m = {}; snap.forEach((d) => { m[d.id] = d.data().url; }); setImages(m); },
      (err) => setThumbErr(err.message || "Gagal sinkron gambar.")
    );
    return () => { unsubBoard(); unsubProjects(); unsubThumbs(); };
  }, []);

  const projects = useMemo(() => mergeProjects(docs), [docs]);
  const board = useMemo(() => reconcile(rawBoard, projects), [rawBoard, projects]);

  /* Tulis susunan papan ke Firestore (admin saja); UI di-update optimistis */
  const commit = (next) => {
    setRawBoard(next);
    if (!canEdit) return Promise.resolve();
    return boardRef().set(next).catch((e) => { setBoardErr(e.message || "Gagal menyimpan."); throw e; });
  };
  const boardWithout = (id) => {
    const next = { deleted: [...(board.deleted || [])] };
    CATEGORIES.forEach((c) => { next[c.key] = board[c.key].filter((x) => x !== id); });
    return next;
  };

  const onDragStart = (e, id) => {
    dragRef.current = id;
    setDragId(id);
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch (_) {}
  };
  const onDragEnd = () => { dragRef.current = null; setDragId(null); setOver(null); };

  const onDrop = (target) => {
    const id = dragRef.current;
    if (!id || !canEdit) return;
    const next = boardWithout(id);
    next[target] = [...next[target], id];
    commit(next);
    dragRef.current = null;
    setDragId(null);
  };

  /* Kartu seed hanya disembunyikan (bisa dipulihkan); proyek tambahan dihapus permanen. */
  const onDelete = async (id) => {
    if (!canEdit) return;
    if (projects[id] && projects[id].custom) {
      if (!window.confirm(`Hapus permanen proyek "${projects[id].name}"?`)) return;
      try {
        await projectsCol().doc(id).delete();
        await thumbsCol().doc(id).delete();
        await commit(boardWithout(id));
      } catch (e) { setProjErr(e.message || "Gagal menghapus proyek."); }
      return;
    }
    const next = boardWithout(id);
    next.deleted = [...next.deleted, id];
    commit(next);
  };

  const restoreAll = () => { if (canEdit) commit({ ...board, deleted: [] }); };
  const resetBoard = () => { if (canEdit) commit(DEFAULT_BOARD); };

  /* Simpan data kartu + gambar ke Firestore. Kode hanya seed, jadi deploy baru tidak menimpa. */
  const saveCard = async (data, image) => {
    if (!canEdit) throw new Error("Butuh login admin.");
    let id;
    if (editing.mode === "add") {
      const base = slugify(data.name);
      id = base;
      for (let n = 2; projects[id]; n++) id = `${base}-${n}`;
    } else {
      id = editing.id;
    }
    await projectsCol().doc(id).set(data, { merge: true });
    if (image) await thumbsCol().doc(id).set({ url: image });
    else await thumbsCol().doc(id).delete();
  };

  const deletedCount = (board.deleted || []).length;
  const customCount = Object.values(projects).filter((p) => p.custom).length;

  return (
    <section id="projects" className="w-full py-24 px-6">
      <FadeInUp className="text-center mb-14 max-w-2xl mx-auto">
        <span className="text-sm font-medium candy-text">✨ Ruang kerjamu</span>
        <h2 className="text-4xl md:text-5xl font-semibold mt-3 tracking-tight">
          Semua <span className="candy-text">proyek Vercel</span>, satu tempat.
        </h2>
        <p className="text-gray-400 mt-4 text-[16px]">
          {canEdit
            ? "Seret kartu antar kategori, ganti gambar, atau hapus. Perubahan langsung tersinkron ke semua pengguna."
            : "Tampilan ini tersinkron untuk semua pengguna. Masuk sebagai admin untuk mengatur kartu dan membuka proyek pribadi."}
        </p>
        {canEdit ? (
          <button onClick={() => setEditing({ mode: "add" })} className="mt-5 inline-flex items-center gap-2 bg-white text-black text-sm font-medium px-5 py-2.5 rounded-full hover:bg-gray-200 transition-colors">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>
            Tambah proyek
          </button>
        ) : (
          <button onClick={promptLogin} className="mt-5 inline-flex items-center gap-2 bg-white text-black text-sm font-medium px-5 py-2.5 rounded-full hover:bg-gray-200 transition-colors">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            Masuk sebagai admin
          </button>
        )}
        {syncErr && <p className="mt-4 text-xs text-red-400">Sinkron bermasalah: {syncErr}</p>}
      </FadeInUp>

      <FadeInUp>
        <div className="flex flex-col gap-6">
          {CATEGORIES.map((cat) => (
            <Column key={cat.key} cat={cat} ids={board[cat.key]} projects={projects} images={images} over={over} setOver={setOver} onDrop={onDrop} dragId={dragId} canDrag={canDrag} canEdit={canEdit} onDragStart={onDragStart} onDragEnd={onDragEnd} onDelete={onDelete} onEditImage={(id) => setEditing({ mode: "edit", id })} />
          ))}
        </div>
        {canEdit && (
          <div className="flex flex-wrap items-center justify-center gap-5 mt-8 text-xs">
            <button onClick={resetBoard} className="text-gray-500 hover:text-gray-300 transition-colors">Atur ulang ke bawaan</button>
            {customCount > 0 && <span className="text-gray-600">{customCount} proyek tambahan</span>}
            {deletedCount > 0 && (
              <button onClick={restoreAll} className="text-gray-400 hover:text-white transition-colors inline-flex items-center gap-1.5">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
                Pulihkan {deletedCount} yang dihapus
              </button>
            )}
          </div>
        )}
      </FadeInUp>

      {editing && (
        <CardModal
          mode={editing.mode}
          p={editing.mode === "edit" ? projects[editing.id] : null}
          currentImage={editing.mode === "edit" ? images[editing.id] : ""}
          onClose={() => setEditing(null)}
          onSave={saveCard}
        />
      )}
    </section>
  );
}
